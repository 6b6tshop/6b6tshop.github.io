<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1a1f2b, #0b0f14);
  font-family: Arial, sans-serif;
  color: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  
  padding: 20px;
}

.wrap {
  width: 500px;
  max-width: 95vw;
}

h2 {
  text-align: center;
  color: #9ad0ff;
  letter-spacing: 2px;
  font-size: 16px;
  margin-bottom: 20px;
}

.nav {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, #4da3ff, #7c5cff);
  color: white;
  font-weight: bold;
}

.button {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  text-decoration: none;
  background: linear-gradient(90deg, #4da3ff, #7c5cff);
  color: white;
  font-weight: bold;
  text-align: center;
}

.page {
  display: none;
  padding: 20px;
  border-radius: 14px;
  background: linear-gradient(145deg, #121826, #0e141f);
  border: 1px solid rgba(255,255,255,0.06);
}

.page.active {
  display: block;
}

.item {
  margin: 10px 0;
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

.item:hover {
  background: rgba(255,255,255,0.05);
}

.small {
  font-size: 12px;
  opacity: 0.8;
}

.top-right {
  position: fixed;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 8px;
  z-index: 999;
}

.top-right a {
  padding: 10px 14px;
  border-radius: 12px;
  background: linear-gradient(90deg, #4da3ff, #7c5cff);
  color: white;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="top-right" id="topRight">
  <a href="about.html" id="teamsBtn">About</a>
  <a href="teams.html" id="teamsBtn">Teams</a>
</div>

<div class="wrap">

  <h2>6b6t Shop</h2>

  <div class="nav">
    
  </div>

   <div id="home" class="page active">
     <a class="button" href="index.html">Back</a>
    <div class="item" onclick="show('home')">6b6t Shop</div>
    <div class="item small">Choose an item to buy</div>
       <a class="button" href="4p.html">Voucher</a>
       <a class="button" href="6p.html">Televisor</a>
       <a class="button" href="4p.html">Resin</a>
  </div>

</div>

</body>
</html>
