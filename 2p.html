<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PVP Kit</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1a1f2b, #0b0f14);
  font-family: Arial, sans-serif;
  color: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.wrap {
  width: 700px;
  max-width: 95vw;
}

h2 {
  text-align: center;
  color: #9ad0ff;
  letter-spacing: 2px;
  font-size: 16px;
  margin-bottom: 20px;
}

.nav {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, #4da3ff, #7c5cff);
  color: white;
  font-weight: bold;
}

.page {
  display: block;
  padding: 20px;
  border-radius: 14px;
  background: linear-gradient(145deg, #121826, #0e141f);
  border: 1px solid rgba(255,255,255,0.06);
}

.item {
  margin: 10px 0;
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

.item:hover {
  background: rgba(255,255,255,0.05);
}

.small {
  font-size: 12px;
  opacity: 0.8;
}

.product {
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.product img {
  width: 240px;
  border-radius: 18px;
  background: #ff2a2a;
  padding: 10px;
}

.info {
  flex: 1;
  min-width: 220px;
}

.info h3 {
  margin: 0 0 10px;
  font-size: 28px;
}

.price {
  font-size: 30px;
  color: #ffffff;
  font-weight: bold;
  margin: 18px 0;
}

.buy {
  display: inline-block;
  text-decoration: none;
}

.buy button {
  width: 180px;
  font-size: 16px;
}
</style>
</head>
<body>

<div class="wrap">
  <a class="back" href="index.html">Back</a>

  <div class="page">
    <div class="product">
<img src="pvpkit.png" alt="PVP Kit">
          <div class="info">
        <h3>Voucher</h3>

        <div class="price">5 Emerald Blocks</div>

        <a class="Order" href="2o.html">
          <button>Order</button>
        </a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
