<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.box {
  background: #1f2937;
  padding: 25px;
  border-radius: 14px;
  width: 320px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
}

button {
  cursor: pointer;
  background: #4f46e5;
  color: white;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p><a href="signup.html" style="color:#93c5fd;">Create account</a></p>
</div>

<script>
function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  const saved = JSON.parse(localStorage.getItem("account"));

  if (!saved) {
    alert("No account found");
    return;
  }

  if (username === saved.username && password === saved.password) {
    alert("Logged in");
    window.location.href = "shop.html";
  } else {
    alert("Wrong username or password");
  }
}
</script>

</body>
</html>
